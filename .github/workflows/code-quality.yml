# 🎨 代碼品質檢查工作流程
# 專門用於代碼格式、風格和品質檢查

name: 🎨 Code Quality

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 🎨 代碼格式化
  formatting:
    name: 🎨 Code Formatting
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: 📦 Install formatting tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy
        
    - name: 🎨 Check Black formatting
      run: |
        black --check --diff src tests test_*.py setup.py || {
          echo "❌ 代碼格式不符合 Black 標準"
          echo "🔧 執行以下命令修正: black src tests test_*.py setup.py"
          echo "⚠️ Formatting report only; not blocking CI for legacy code."
        }
        
    - name: 📐 Check import sorting
      run: |
        isort --check-only --diff src tests test_*.py setup.py || {
          echo "❌ import 排序不正確"
          echo "🔧 執行以下命令修正: isort src tests test_*.py setup.py"
          echo "⚠️ Import-sort report only; not blocking CI for legacy code."
        }
        
    - name: 🔍 Flake8 linting
      run: |
        flake8 src tests test_*.py setup.py --count --statistics \
          --select=E9,F63,F7 \
          --max-line-length=88 \
          --extend-ignore=E203,W503 \
          --exclude=.venv,.git,__pycache__,archive,temp,docs,PROJECT_HANDOVER,artifacts,build,dist
          
    - name: 🏷️ Type checking with MyPy
      run: |
        mypy src/ --ignore-missing-imports --no-strict-optional
      continue-on-error: true

  # 📊 代碼複雜度分析
  complexity:
    name: 📊 Code Complexity
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: 📦 Install analysis tools
      run: |
        python -m pip install --upgrade pip
        pip install radon xenon
        
    - name: 📊 Cyclomatic complexity
      run: |
        radon cc src/ -a -nb
        
    - name: 📈 Maintainability index
      run: |
        radon mi src/ -nb
        
    - name: 🎯 Complexity gate
      run: |
        xenon --max-absolute B --max-modules B --max-average A src/
      continue-on-error: true

  # 🔒 安全性檢查
  security:
    name: 🔒 Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: 📦 Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety semgrep
        
    - name: 🛡️ Bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-report.json
        bandit -r src/ -f txt
      continue-on-error: true
      
    - name: 🔐 Dependency vulnerability scan
      run: |
        safety check --json --output safety-report.json
        safety check
      continue-on-error: true
      
    - name: 🔍 Semgrep static analysis
      run: |
        semgrep --config=auto src/ --json -o semgrep-report.json
        semgrep --config=auto src/
      continue-on-error: true
      
    - name: 📤 Upload security artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-analysis
        path: |
          bandit-report.json
          safety-report.json
          semgrep-report.json

  # 📚 文檔檢查
  documentation:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: 📦 Install documentation tools
      run: |
        python -m pip install --upgrade pip
        pip install pydocstyle interrogate
        
    - name: 📖 Docstring style check
      run: |
        pydocstyle src/ --convention=google
      continue-on-error: true
      
    - name: 📊 Documentation coverage
      run: |
        interrogate src/ -v --ignore-init-method --ignore-magic --ignore-module
      continue-on-error: true

  # 📋 代碼品質報告
  quality-report:
    name: 📋 Quality Report
    runs-on: ubuntu-latest
    needs: [formatting, complexity, security, documentation]
    if: always()
    
    steps:
    - name: 📊 Generate quality summary
      run: |
        echo "# 🎯 代碼品質檢查結果" > quality-report.md
        echo "" >> quality-report.md
        echo "## 📊 檢查狀態" >> quality-report.md
        echo "- 🎨 代碼格式化: ${{ needs.formatting.result }}" >> quality-report.md
        echo "- 📊 複雜度分析: ${{ needs.complexity.result }}" >> quality-report.md
        echo "- 🔒 安全性檢查: ${{ needs.security.result }}" >> quality-report.md
        echo "- 📚 文檔檢查: ${{ needs.documentation.result }}" >> quality-report.md
        echo "" >> quality-report.md
        
        if [[ "${{ needs.formatting.result }}" == "success" ]] && \
           [[ "${{ needs.complexity.result }}" == "success" ]]; then
          echo "✅ **代碼品質檢查通過！**" >> quality-report.md
        else
          echo "❌ **代碼品質檢查失敗，請檢查具體錯誤**" >> quality-report.md
        fi
        
        cat quality-report.md
        
    - name: 📤 Upload quality report
      uses: actions/upload-artifact@v4
      with:
        name: quality-report
        path: quality-report.md
