[pytest]
# JoJo Trading System - Pytest Configuration
# 配置 pytest 測試框架設定

# 基本設定
minversion = 6.0
addopts = 
    -ra
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=html:reports/coverage
    --cov-report=term-missing
    --cov-fail-under=70
    --html=reports/test_report.html
    --self-contained-html
    --ignore=tests/archive

# 測試發現設定
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 忽略的目錄
norecursedirs = 
    archive*
    .venv
    .git
    __pycache__
    .pytest_cache
    *.egg-info
    dist
    build
    cache
    temp

# 標記定義
markers =
    unit: 單元測試
    integration: 整合測試
    system: 系統測試
    slow: 執行時間較長的測試 (>5秒)
    fast: 快速測試 (<1秒)
    api: 需要外部 API 的測試
    database: 需要資料庫的測試
    performance: 性能測試
    regression: 回歸測試
    smoke: 冒煙測試

# 過濾警告
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 日誌設定
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
