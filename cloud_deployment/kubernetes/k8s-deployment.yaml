apiVersion: v1
kind: Namespace
metadata:
  name: jojo-trading
  labels:
    name: jojo-trading
    environment: production
---
apiVersion: v1
kind: Secret
metadata:
  name: jojo-trading-secrets
  namespace: jojo-trading
type: Opaque
data:
  finmind-token: eW91ci1maW5taW5kLXRva2VuLWhlcmU=  # base64 encoded
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jojo-trading-config
  namespace: jojo-trading
data:
  ENV: "production"
  REDIS_URL: "redis://redis-service:6379"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jojo-trading-app
  namespace: jojo-trading
  labels:
    app: jojo-trading
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: jojo-trading
  template:
    metadata:
      labels:
        app: jojo-trading
        version: v1.0.0
    spec:
      containers:
      - name: jojo-trading
        image: jojo-trading:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
          name: streamlit
        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: jojo-trading-config
              key: ENV
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: jojo-trading-config
              key: REDIS_URL
        - name: FINMIND_TOKEN
          valueFrom:
            secretKeyRef:
              name: jojo-trading-secrets
              key: finmind-token
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: jojo-trading-service
  namespace: jojo-trading
  labels:
    app: jojo-trading
spec:
  type: ClusterIP
  ports:
  - port: 8501
    targetPort: 8501
    protocol: TCP
    name: streamlit
  selector:
    app: jojo-trading
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: jojo-trading
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        command:
        - redis-server
        - --maxmemory
        - 256mb
        - --maxmemory-policy
        - allkeys-lru
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: jojo-trading
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: redis
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jojo-trading-ingress
  namespace: jojo-trading
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - jojo-trading.yourdomain.com
    secretName: jojo-trading-tls
  rules:
  - host: jojo-trading.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jojo-trading-service
            port:
              number: 8501
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jojo-trading-hpa
  namespace: jojo-trading
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jojo-trading-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jojo-trading-data
  namespace: jojo-trading
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: jojo-trading-pdb
  namespace: jojo-trading
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: jojo-trading
